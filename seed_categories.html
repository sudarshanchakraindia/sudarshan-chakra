  window.showCurrent = async function() {
    document.getElementById('log').textContent = '';
    log('⏳ Loading from Firebase...\n');
    try {
      const snap = await get(ref(db, 'categories'));
      if (!snap.exists()) { log('⚠️ No categories in Firebase!'); return; }
      const cats = snap.val();
      log('Found ' + cats.length + ' categories:\n');
      cats.forEach((c, i) => {
        const name = c.name?.en || c.name || 'Unknown';
        const subs = (c.subcategories || []).length;
        log((i+1) + '. 📁 ' + name + ' (' + subs + ' subs)');
      });
    } catch(e) { log('❌ ' + e.message); }
  };

  window.restoreAndMerge = async function() {
    document.getElementById('log').textContent = '';
    document.getElementById('btnRestore').disabled = true;
    log('⏳ Preparing multilingual categories...\n');

    const merged = [...OLD_CATEGORIES];
    log('✅ Original categories: ' + OLD_CATEGORIES.length);

    let added = 0;
    ITI_CATEGORIES.forEach(newCat => {
      if (!merged.find(e => e.id === newCat.id)) {
        merged.push(newCat);
        added++;
      }
    });
    log('✅ ITI categories added: ' + added);
    log('📦 Total: ' + merged.length + ' categories');
    log('🌐 Languages: EN HI BN GU MR KN TE ML TA PA OR AS\n');
    log('⏳ Saving to Firebase...');

    try {
      await set(ref(db, 'categories'), merged);
      log('\n🎉 SUCCESS! ' + merged.length + ' categories saved!');
      merged.forEach(c => log('  • ' + (c.name?.en || c.name)));
      log('\n✅ Refresh your app — all languages working!');
      document.getElementById('status').textContent = '🎉 Done! ' + merged.length + ' categories live!';
      document.getElementById('status').style.color = '#059669';
    } catch(e) {
      log('\n❌ Save failed: ' + e.message);
      document.getElementById('status').textContent = '❌ Save failed';
      document.getElementById('status').style.color = '#DC2626';
    }
    document.getElementById('btnRestore').disabled = false;
  };
</script>
